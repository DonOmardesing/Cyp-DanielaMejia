<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniela Mejía | Cejas y Pestañas en Sonsón</title>
    <meta name="description" content="Especialista en micropigmentación de cejas y extensiones de pestañas.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#FFD700;--gold-light:#FFF8DC;--black:#0a0a0a;--dark-gray:#1a1a1a}
        html{scroll-behavior:smooth}
        body{font-family:'Segoe UI',sans-serif;background:var(--black);color:#fff;line-height:1.6}
        h1,h2,h3,h4,h5,h6{font-family:'Playfair Display',serif;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,0.5);font-weight:700}
        
        #preloader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--black);z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s}
        #preloader.hidden{opacity:0;pointer-events:none}
        .preloader-logo{font-size:3rem;color:var(--gold);animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        
        nav{position:fixed;top:0;width:100%;background:rgba(10,10,10,0.95);backdrop-filter:blur(10px);z-index:1000;padding:1rem 5%;border-bottom:2px solid var(--gold)}

        .logo{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);text-decoration:none;font-weight:700}
        .nav-links{display:flex;gap:2rem;align-items:center}
        .nav-links a{color:var(--gold-light);text-decoration:none;transition:0.3s;font-family:'Playfair Display',serif}
        .nav-links a:hover{color:var(--gold)}
        .menu-toggle{display:none;background:none;border:none;color:var(--gold);font-size:1.5rem;cursor:pointer}
        
        .hero{margin-top:70px;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 5%}
        .hero-content{max-width:100%;width:100%}
        .hero-logo{width:100%;max-width:100%;margin-bottom:1.5rem;display:block}
        .hero-daniela{width:100%;max-width:600px;margin:0 auto 2rem;display:block;border-radius:15px;border:3px solid var(--gold)}
        .social-banner{display:flex;gap:1rem;justify-content:center;margin-top:2.5rem;flex-wrap:wrap}
        .social-btn{padding:1rem 2.5rem;border-radius:50px;display:flex;align-items:center;gap:0.5rem;color:#fff;font-weight:bold;transition:0.3s;text-decoration:none;border:2px solid var(--gold);font-family:'Playfair Display',serif}
        .social-btn.instagram{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-color:transparent}
        .social-btn.tiktok{background:#000}
        .social-btn.whatsapp{background:#25D366;border-color:transparent}
        .social-btn:hover{transform:translateY(-5px)}
        
        .section-title{text-align:center;color:var(--gold);margin-bottom:2rem;font-size:3rem;font-family:'Playfair Display',serif}
        section{padding:5rem 5%;max-width:1200px;margin:0 auto}
        
        .services{background:var(--dark-gray);max-width:100%}
        .services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem}
        .service-card{background:var(--black);border:2px solid var(--gold);border-radius:15px;padding:2rem;text-align:center;transition:0.3s}
        .service-card:hover{transform:translateY(-10px);box-shadow:0 15px 30px rgba(255,215,0,0.2)}
        .service-card i{font-size:3rem;color:var(--gold);margin-bottom:1rem}
        .service-card h3{color:var(--gold);margin-bottom:1rem;font-family:'Playfair Display',serif}
        .service-card p{color:var(--gold-light);margin-bottom:1rem}
        .price{font-size:1.8rem;color:var(--gold);font-weight:bold;margin:1rem 0}
        .btn{padding:0.8rem 2rem;border:2px solid var(--gold);background:var(--gold);color:var(--black);text-decoration:none;border-radius:50px;font-weight:bold;cursor:pointer;display:inline-block;transition:0.3s;font-family:'Playfair Display',serif}
        .btn:hover{background:transparent;color:var(--gold)}
        
        .about-grid{display:grid;grid-template-columns:1fr 2fr;gap:3rem;align-items:center}
        .about-image img{width:100%;border-radius:15px;border:3px solid var(--gold)}
        .about-content h3{color:var(--gold);font-size:2.5rem;margin-bottom:1rem;font-family:'Playfair Display',serif}
        .about-content p{color:var(--gold-light);margin-bottom:1rem}
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:2rem}
        .stat-item{text-align:center;padding:1rem;background:var(--dark-gray);border:2px solid var(--gold);border-radius:10px}
        .stat-item .number{font-size:2rem;color:var(--gold);font-weight:bold}
        .stat-item .label{color:var(--gold-light);font-size:0.9rem}
        
        .gallery{background:var(--dark-gray);max-width:100%}
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:0}
        .gallery-item{position:relative;overflow:hidden;border:2px solid var(--gold);aspect-ratio:1;cursor:pointer}
        .gallery-item img{width:100%;height:100%;object-fit:cover;transition:0.5s}
        .gallery-item:hover img{transform:scale(1.1)}
        
        #lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10001;align-items:center;justify-content:center}
        #lightbox.active{display:flex}
        #lightbox img{max-width:90%;max-height:90vh;border-radius:10px;border:3px solid var(--gold)}
        .lightbox-close{position:absolute;top:20px;right:30px;background:none;border:none;color:var(--gold);font-size:2.5rem;cursor:pointer}
        
        .tips-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem}
        .tip-card{background:var(--dark-gray);border:2px solid var(--gold);border-radius:15px;padding:2rem}
        .tip-card h3{color:var(--gold);margin-bottom:1rem;font-family:'Playfair Display',serif}
        .tip-card p{color:var(--gold-light);margin-bottom:1rem}
        .video-wrapper{position:relative;padding-bottom:56.25%;height:0;margin-top:1rem;background:#000;border-radius:10px;overflow:hidden;border:2px solid var(--gold)}
        .video-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
        .video-placeholder{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;cursor:pointer}
        .video-placeholder img{width:100%;height:100%;object-fit:cover}
        .play-btn{position:absolute;width:70px;height:70px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center}
        .play-btn i{color:var(--black);font-size:2rem;margin-left:5px}
        
        .trajectory{background:var(--dark-gray)}
        .trajectory-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem}
        .trajectory-card{border:3px solid var(--gold);border-radius:15px;overflow:hidden;background:var(--black)}
        .trajectory-card img{width:100%;height:300px;object-fit:cover}
        .trajectory-card-content{padding:1.5rem}
        .trajectory-card h3{color:var(--gold);margin-bottom:0.5rem;font-family:'Playfair Display',serif}
        .trajectory-card p{color:var(--gold-light)}
        .date-badge{display:inline-block;background:var(--gold);color:var(--black);padding:0.3rem 1rem;border-radius:20px;font-weight:bold;margin-top:1rem}
        
        .reviews-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem}
        .review-card{background:var(--dark-gray);border:2px solid var(--gold);border-radius:15px;padding:2rem}
        .review-card .stars{color:var(--gold);margin-bottom:1rem}
        .review-card p{color:var(--gold-light);font-style:italic;margin-bottom:1rem}
        .review-card .client-name{color:var(--gold);font-weight:bold;font-family:'Playfair Display',serif}
        
        .contact{background:var(--dark-gray);text-align:center}
        .contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;max-width:800px;margin:0 auto}
        .contact-item{padding:1.5rem;background:var(--black);border:2px solid var(--gold);border-radius:10px;transition:0.3s}
        .contact-item:hover{transform:translateY(-5px)}
        .contact-item i{font-size:2.5rem;color:var(--gold);margin-bottom:1rem}
        .contact-item h3{color:var(--gold);margin-bottom:0.5rem;font-family:'Playfair Display',serif}
        .contact-item a{color:var(--gold-light);text-decoration:none}
        .cta-whatsapp{margin-top:3rem}
        
        .floating-whatsapp{position:fixed;bottom:30px;right:30px;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;text-decoration:none;z-index:999}
        .scroll-top{position:fixed;bottom:100px;right:30px;width:50px;height:50px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--black);font-size:1.5rem;cursor:pointer;opacity:0;pointer-events:none;transition:0.3s;z-index:999}
        .scroll-top.visible{opacity:1;pointer-events:auto}
        
        #waModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:10002;align-items:center;justify-content:center}
        #waModal.active{display:flex}
        .wa-content{background:var(--dark-gray);border:3px solid var(--gold);border-radius:15px;padding:2rem;max-width:400px;width:90%;text-align:center}
        .wa-content h3{color:var(--gold);margin-bottom:1.5rem;font-family:'Playfair Display',serif}
        .wa-btn{display:block;width:100%;padding:1rem;margin-bottom:1rem;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;text-decoration:none}
        .wa-btn.secondary{background:transparent;border:2px solid var(--gold);color:var(--gold)}
        
        footer{background:var(--black);text-align:center;padding:2rem;border-top:2px solid var(--gold)}
        footer p{color:var(--gold-light);margin:0.5rem 0}
        .admin-trigger{position:fixed;bottom:0;left:0;width:100px;height:100px;z-index:9999;cursor:default}
        #adminModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10000;overflow-y:auto}
        #adminModal.active{display:block}
        .admin-content{max-width:800px;margin:2rem auto;padding:2rem;background:var(--dark-gray);border:3px solid var(--gold);border-radius:15px}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:2px solid var(--gold)}
        .admin-header h2{color:var(--gold);font-family:'Playfair Display',serif}
        .close-admin{background:none;border:none;color:var(--gold);font-size:2rem;cursor:pointer}
        .admin-section{margin-bottom:2rem;padding:1.5rem;background:var(--black);border:2px solid var(--gold);border-radius:10px}
        .admin-section h3{color:var(--gold);margin-bottom:1rem;font-family:'Playfair Display',serif}
        .admin-form{display:grid;gap:1rem}
        .admin-form label{color:var(--gold-light);font-weight:bold}
        .admin-form input,.admin-form textarea{width:100%;padding:0.8rem;background:var(--dark-gray);border:2px solid var(--gold);border-radius:8px;color:#fff}
        .admin-form textarea{min-height:100px;resize:vertical}
